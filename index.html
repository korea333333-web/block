<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>벽돌깨기 - Brick Breaker</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: 'Segoe UI', -apple-system, sans-serif;
  background: radial-gradient(ellipse at top, #1a1a3e 0%, #0a0a1a 100%);
  color: #fff;
  min-height: 100vh;
  overflow-x: hidden;
}

.container {
  max-width: 1000px;
  margin: 0 auto;
  padding: 24px 20px;
}

header {
  text-align: center;
  margin-bottom: 28px;
}

h1 {
  font-size: 2.4rem;
  font-weight: 800;
  letter-spacing: 2px;
  background: linear-gradient(135deg, #ff6b6b, #feca57);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 6px;
}

.subtitle {
  color: #888;
  font-size: 0.85rem;
}

/* ─── 플레이어 등록 ───────────────────────── */
.player-form {
  background: rgba(26, 26, 46, 0.6);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 20px 24px;
  margin-bottom: 20px;
  border: 1px solid #2a2a4e;
  display: flex;
  gap: 16px;
  align-items: center;
  flex-wrap: wrap;
}

.player-form .field {
  flex: 1;
  min-width: 180px;
}

.player-form label {
  display: block;
  font-size: 0.75rem;
  color: #aaa;
  margin-bottom: 4px;
  letter-spacing: 0.5px;
}

.player-form input[type="text"] {
  width: 100%;
  padding: 11px 16px;
  border-radius: 10px;
  border: 1px solid #2a2a4e;
  background: rgba(15, 15, 35, 0.6);
  color: #fff;
  font-size: 0.95rem;
  transition: border-color 0.2s;
}

.player-form input[type="text"]:focus {
  outline: none;
  border-color: #feca57;
}

.photo-upload {
  position: relative;
  width: 64px;
  height: 64px;
  border-radius: 50%;
  background: rgba(15, 15, 35, 0.6);
  border: 2px dashed #444;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  overflow: hidden;
  flex-shrink: 0;
  transition: border-color 0.2s;
}

.photo-upload:hover { border-color: #feca57; }

.photo-upload img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.photo-upload .icon {
  font-size: 1.6rem;
  color: #555;
}

.photo-upload .label {
  position: absolute;
  bottom: -18px;
  font-size: 0.65rem;
  color: #666;
  white-space: nowrap;
}

.photo-upload input {
  position: absolute;
  inset: 0;
  opacity: 0;
  cursor: pointer;
}

.btn-start {
  padding: 12px 32px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  font-weight: 700;
  font-size: 1rem;
  cursor: pointer;
  white-space: nowrap;
  transition: transform 0.1s, box-shadow 0.2s;
  box-shadow: 0 4px 12px rgba(238, 90, 36, 0.3);
}

.btn-start:hover {
  transform: translateY(-1px);
  box-shadow: 0 6px 16px rgba(238, 90, 36, 0.4);
}

.btn-start:active { transform: translateY(0); }

/* ─── 게임 영역 ───────────────────────────── */
.game-area {
  display: flex;
  gap: 20px;
  flex-wrap: wrap;
}

.game-left {
  flex: 1;
  min-width: 400px;
}

canvas {
  display: block;
  background: #0a0a1a;
  border-radius: 12px;
  border: 1px solid #2a2a4e;
  width: 100%;
  max-width: 600px;
  box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
}

.game-hud {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 10px 4px;
  font-size: 0.85rem;
  color: #aaa;
}

.player-info {
  display: flex;
  align-items: center;
  gap: 8px;
}

.player-info img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
  object-fit: cover;
  border: 2px solid #feca57;
}

.player-info .name {
  font-weight: 600;
  color: #fff;
}

.hud-stat {
  display: flex;
  align-items: center;
  gap: 6px;
}

.hud-stat strong { color: #feca57; font-size: 1rem; }

/* ─── 리더보드 ────────────────────────────── */
.leaderboard {
  width: 280px;
  background: rgba(26, 26, 46, 0.6);
  backdrop-filter: blur(10px);
  border-radius: 16px;
  padding: 20px;
  border: 1px solid #2a2a4e;
  max-height: 600px;
  overflow-y: auto;
}

.leaderboard h3 {
  font-size: 1rem;
  margin-bottom: 14px;
  color: #feca57;
  text-align: center;
  letter-spacing: 1px;
}

.lb-loading {
  text-align: center;
  color: #555;
  padding: 20px;
  font-size: 0.85rem;
}

.lb-entry {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 10px;
  border-radius: 10px;
  margin-bottom: 6px;
  background: rgba(15, 15, 35, 0.6);
  transition: transform 0.15s;
}

.lb-entry:hover { transform: translateX(2px); }

.lb-entry.top1 { background: linear-gradient(135deg, #f1c40f33, #f39c1233); border: 1px solid #f1c40f55; }
.lb-entry.top2 { background: linear-gradient(135deg, #bdc3c733, #95a5a633); border: 1px solid #bdc3c755; }
.lb-entry.top3 { background: linear-gradient(135deg, #e67e2233, #d3541533); border: 1px solid #e67e2255; }

.lb-rank {
  font-weight: 700;
  font-size: 0.9rem;
  width: 26px;
  text-align: center;
  color: #feca57;
}

.lb-photo {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  object-fit: cover;
  background: #333;
  flex-shrink: 0;
}

.lb-info { flex: 1; min-width: 0; }

.lb-name {
  font-size: 0.85rem;
  font-weight: 600;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.lb-score {
  font-size: 0.75rem;
  color: #aaa;
  margin-top: 2px;
}

.lb-empty {
  text-align: center;
  color: #555;
  padding: 30px 20px;
  font-size: 0.85rem;
}

/* ─── 게임오버 오버레이 ──────────────────── */
.overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.85);
  backdrop-filter: blur(6px);
  z-index: 100;
  align-items: center;
  justify-content: center;
  padding: 20px;
}

.overlay.show { display: flex; }

.overlay-box {
  background: linear-gradient(135deg, #1a1a3e, #0f0f23);
  border-radius: 20px;
  padding: 40px 50px;
  text-align: center;
  border: 1px solid #feca57;
  box-shadow: 0 20px 60px rgba(254, 202, 87, 0.2);
  max-width: 90vw;
}

.overlay-box h2 {
  font-size: 1.8rem;
  margin-bottom: 8px;
}

.overlay-box .final-score {
  font-size: 3rem;
  font-weight: 800;
  background: linear-gradient(135deg, #ff6b6b, #feca57);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  margin-bottom: 24px;
}

.overlay-box button {
  padding: 12px 28px;
  border-radius: 10px;
  border: none;
  background: linear-gradient(135deg, #ff6b6b, #ee5a24);
  color: #fff;
  font-weight: 700;
  font-size: 0.95rem;
  cursor: pointer;
  margin: 0 6px;
}

.overlay-box button.secondary {
  background: rgba(255, 255, 255, 0.1);
}

footer {
  text-align: center;
  color: #444;
  font-size: 0.7rem;
  margin-top: 40px;
  padding: 20px 0;
}

@media (max-width: 720px) {
  .game-area { flex-direction: column; }
  .leaderboard { width: 100%; }
  .game-left { min-width: unset; }
  h1 { font-size: 1.8rem; }
}
</style>
</head>
<body>

<div class="container">
  <header>
    <h1>BRICK BREAKER</h1>
    <p class="subtitle">이름과 사진을 등록하고 최고 점수에 도전하세요</p>
  </header>

  <!-- 플레이어 등록 -->
  <div class="player-form">
    <div class="photo-upload" id="photoUpload" title="사진 추가 (선택)">
      <span class="icon" id="photoPlaceholder">📷</span>
      <img id="photoPreview" style="display:none;" alt="player" />
      <input type="file" id="photoInput" accept="image/*" />
    </div>
    <div class="field">
      <label>플레이어 이름</label>
      <input type="text" id="playerName" placeholder="이름을 입력하세요" maxlength="20" />
    </div>
    <button class="btn-start" id="btnStart">게임 시작</button>
  </div>

  <!-- 게임 -->
  <div class="game-area">
    <div class="game-left">
      <div class="game-hud">
        <div class="player-info">
          <img id="hudPhoto" src="" style="display:none;" alt="" />
          <span class="name" id="hudName">-</span>
        </div>
        <div class="hud-stat">점수 <strong id="hudScore">0</strong></div>
        <div class="hud-stat">생명 <strong id="hudLives">3</strong></div>
      </div>
      <canvas id="gameCanvas" width="600" height="400"></canvas>
    </div>

    <div class="leaderboard">
      <h3>🏆 리더보드</h3>
      <div id="lbList"><div class="lb-loading">불러오는 중...</div></div>
    </div>
  </div>

  <footer>벽돌깨기로 구글 앱스스크립트 연습</footer>
</div>

<!-- 게임오버 -->
<div class="overlay" id="overlay">
  <div class="overlay-box">
    <h2 id="overlayTitle">게임 오버!</h2>
    <div class="final-score" id="finalScore">0</div>
    <button onclick="restartGame()">다시 하기</button>
    <button class="secondary" onclick="closeOverlay()">닫기</button>
  </div>
</div>

<script>
// ─── 백엔드 설정 (고정) ────────────────────────────────────────
const GAS_URL = 'https://script.google.com/macros/s/AKfycbwUnrl9zAUIq_MWtHUxQruHvXcWP7tYop_LY2Pc4Kw2IFJpWkfXMj4c54gvHY_njtiwbQ/exec';

async function gasRequest(payload) {
  try {
    const resp = await fetch(GAS_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' },
      body: JSON.stringify(payload),
    });
    return await resp.json();
  } catch (e) {
    console.warn('백엔드 요청 실패:', e);
    return null;
  }
}

// ─── 점수 저장/조회 ────────────────────────────────────────────
async function saveScore(name, score, photoData) {
  const record = {
    name,
    score,
    photo: photoData || '',
    played_at: new Date().toISOString(),
  };
  await gasRequest({
    action: 'insert',
    table: 'scores',
    records: record,
  });
}

async function loadLeaderboard() {
  const result = await gasRequest({
    action: 'select',
    table: 'scores',
    columns: '*',
    filters: [],
    order: { column: 'score', ascending: false },
    limit: 20,
  });

  const scores = (result && result.data && Array.isArray(result.data)) ? result.data : [];
  renderLeaderboard(scores);
}

function renderLeaderboard(scores) {
  const container = document.getElementById('lbList');
  if (!scores || scores.length === 0) {
    container.innerHTML = '<div class="lb-empty">아직 기록이 없습니다.<br>첫 도전자가 되어보세요!</div>';
    return;
  }

  container.innerHTML = scores.map((s, i) => {
    const rankClass = i === 0 ? 'top1' : i === 1 ? 'top2' : i === 2 ? 'top3' : '';
    const medal = i === 0 ? '🥇' : i === 1 ? '🥈' : i === 2 ? '🥉' : (i + 1);
    const photoEl = s.photo
      ? `<img class="lb-photo" src="${s.photo}" alt="" />`
      : `<div class="lb-photo" style="display:flex;align-items:center;justify-content:center;color:#666;">?</div>`;

    return `
      <div class="lb-entry ${rankClass}">
        <div class="lb-rank">${medal}</div>
        ${photoEl}
        <div class="lb-info">
          <div class="lb-name">${escapeHtml(s.name || '???')}</div>
          <div class="lb-score">${Number(s.score).toLocaleString()}점</div>
        </div>
      </div>
    `;
  }).join('');
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ─── 사진 업로드 ───────────────────────────────────────────────
let playerPhoto = '';

document.getElementById('photoInput').addEventListener('change', (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();
  reader.onload = (ev) => {
    const img = new Image();
    img.onload = () => {
      const c = document.createElement('canvas');
      const size = 80;
      c.width = size;
      c.height = size;
      const cx = c.getContext('2d');
      const min = Math.min(img.width, img.height);
      cx.drawImage(img, (img.width - min) / 2, (img.height - min) / 2, min, min, 0, 0, size, size);
      playerPhoto = c.toDataURL('image/jpeg', 0.6);

      document.getElementById('photoPreview').src = playerPhoto;
      document.getElementById('photoPreview').style.display = 'block';
      document.getElementById('photoPlaceholder').style.display = 'none';
    };
    img.src = ev.target.result;
  };
  reader.readAsDataURL(file);
});

// ─── 게임 엔진 ─────────────────────────────────────────────────
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

let gameRunning = false;
let score = 0;
let lives = 3;
let playerName = '';

const paddle = { w: 90, h: 14, x: 0, y: 0, speed: 7 };
const ball = { x: 0, y: 0, r: 8, dx: 4, dy: -4, speed: 4 };
let bricks = [];
const brickRows = 5, brickCols = 8;
const brickW = 65, brickH = 22, brickPad = 6;
const brickOffsetTop = 40, brickOffsetLeft = 20;
const brickColors = ['#e74c3c', '#e67e22', '#f1c40f', '#2ecc71', '#3498db'];

let keys = {};

function initGame() {
  paddle.x = canvas.width / 2 - paddle.w / 2;
  paddle.y = canvas.height - 30;
  ball.x = canvas.width / 2;
  ball.y = paddle.y - ball.r - 2;
  ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
  ball.dy = -ball.speed;

  bricks = [];
  for (let r = 0; r < brickRows; r++) {
    for (let c = 0; c < brickCols; c++) {
      bricks.push({
        x: brickOffsetLeft + c * (brickW + brickPad),
        y: brickOffsetTop + r * (brickH + brickPad),
        w: brickW, h: brickH,
        color: brickColors[r],
        alive: true,
        points: (brickRows - r) * 10,
      });
    }
  }

  score = 0;
  lives = 3;
  updateHUD();
}

function updateHUD() {
  document.getElementById('hudScore').textContent = score;
  document.getElementById('hudLives').textContent = lives;
}

function drawPaddle() {
  ctx.fillStyle = '#ecf0f1';
  ctx.beginPath();
  ctx.roundRect(paddle.x, paddle.y, paddle.w, paddle.h, 7);
  ctx.fill();
}

function drawBall() {
  ctx.fillStyle = '#fff';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r, 0, Math.PI * 2);
  ctx.fill();
  ctx.fillStyle = 'rgba(255,255,255,0.1)';
  ctx.beginPath();
  ctx.arc(ball.x, ball.y, ball.r + 4, 0, Math.PI * 2);
  ctx.fill();
}

function drawBricks() {
  bricks.forEach(b => {
    if (!b.alive) return;
    ctx.fillStyle = b.color;
    ctx.beginPath();
    ctx.roundRect(b.x, b.y, b.w, b.h, 4);
    ctx.fill();
    ctx.fillStyle = 'rgba(255,255,255,0.2)';
    ctx.fillRect(b.x + 2, b.y + 2, b.w - 4, 3);
  });
}

function movePaddle() {
  if (keys['ArrowLeft'] || keys['a']) paddle.x -= paddle.speed;
  if (keys['ArrowRight'] || keys['d']) paddle.x += paddle.speed;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
}

function moveBall() {
  ball.x += ball.dx;
  ball.y += ball.dy;

  if (ball.x - ball.r <= 0 || ball.x + ball.r >= canvas.width) ball.dx *= -1;
  if (ball.y - ball.r <= 0) ball.dy *= -1;

  if (ball.y + ball.r >= paddle.y && ball.y + ball.r <= paddle.y + paddle.h + 4 && ball.x >= paddle.x && ball.x <= paddle.x + paddle.w) {
    ball.dy = -Math.abs(ball.dy);
    const hitPos = (ball.x - paddle.x) / paddle.w;
    ball.dx = ball.speed * (hitPos - 0.5) * 2.5;
  }

  if (ball.y + ball.r >= canvas.height) {
    lives--;
    updateHUD();
    if (lives <= 0) { gameOver(); return; }
    ball.x = canvas.width / 2;
    ball.y = paddle.y - ball.r - 2;
    ball.dx = ball.speed * (Math.random() > 0.5 ? 1 : -1);
    ball.dy = -ball.speed;
  }

  bricks.forEach(b => {
    if (!b.alive) return;
    if (ball.x + ball.r > b.x && ball.x - ball.r < b.x + b.w && ball.y + ball.r > b.y && ball.y - ball.r < b.y + b.h) {
      b.alive = false;
      ball.dy *= -1;
      score += b.points;
      updateHUD();
      if (bricks.every(br => !br.alive)) gameWin();
    }
  });
}

function gameLoop() {
  if (!gameRunning) return;
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  movePaddle();
  moveBall();
  drawBricks();
  drawPaddle();
  drawBall();
  requestAnimationFrame(gameLoop);
}

async function gameOver() {
  gameRunning = false;
  document.getElementById('overlayTitle').textContent = '게임 오버!';
  document.getElementById('finalScore').textContent = score.toLocaleString() + '점';
  document.getElementById('overlay').classList.add('show');
  await saveScore(playerName, score, playerPhoto);
  await loadLeaderboard();
}

async function gameWin() {
  gameRunning = false;
  score += lives * 100;
  document.getElementById('overlayTitle').textContent = '🎉 클리어!';
  document.getElementById('finalScore').textContent = score.toLocaleString() + '점';
  document.getElementById('overlay').classList.add('show');
  await saveScore(playerName, score, playerPhoto);
  await loadLeaderboard();
}

function restartGame() {
  closeOverlay();
  initGame();
  gameRunning = true;
  gameLoop();
}

function closeOverlay() {
  document.getElementById('overlay').classList.remove('show');
}

// ─── 입력 ──────────────────────────────────────────────────────
document.addEventListener('keydown', (e) => { keys[e.key] = true; });
document.addEventListener('keyup', (e) => { keys[e.key] = false; });

canvas.addEventListener('mousemove', (e) => {
  if (!gameRunning) return;
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  paddle.x = (e.clientX - rect.left) * scaleX - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
});

canvas.addEventListener('touchmove', (e) => {
  if (!gameRunning) return;
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const scaleX = canvas.width / rect.width;
  paddle.x = (e.touches[0].clientX - rect.left) * scaleX - paddle.w / 2;
  paddle.x = Math.max(0, Math.min(canvas.width - paddle.w, paddle.x));
}, { passive: false });

document.getElementById('btnStart').addEventListener('click', () => {
  const nameInput = document.getElementById('playerName');
  playerName = nameInput.value.trim();
  if (!playerName) {
    nameInput.style.borderColor = '#e74c3c';
    nameInput.focus();
    return;
  }
  nameInput.style.borderColor = '';

  document.getElementById('hudName').textContent = playerName;
  if (playerPhoto) {
    document.getElementById('hudPhoto').src = playerPhoto;
    document.getElementById('hudPhoto').style.display = 'block';
  }

  initGame();
  gameRunning = true;
  gameLoop();
});

// roundRect 폴리필
if (!CanvasRenderingContext2D.prototype.roundRect) {
  CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
    if (typeof r === 'number') r = { tl: r, tr: r, br: r, bl: r };
    this.moveTo(x + r.tl, y);
    this.lineTo(x + w - r.tr, y);
    this.quadraticCurveTo(x + w, y, x + w, y + r.tr);
    this.lineTo(x + w, y + h - r.br);
    this.quadraticCurveTo(x + w, y + h, x + w - r.br, y + h);
    this.lineTo(x + r.bl, y + h);
    this.quadraticCurveTo(x, y + h, x, y + h - r.bl);
    this.lineTo(x, y + r.tl);
    this.quadraticCurveTo(x, y, x + r.tl, y);
    this.closePath();
    return this;
  };
}

// 시작 화면
ctx.fillStyle = '#0a0a1a';
ctx.fillRect(0, 0, canvas.width, canvas.height);
ctx.fillStyle = '#666';
ctx.font = '18px sans-serif';
ctx.textAlign = 'center';
ctx.fillText('이름을 입력하고 [게임 시작] 을 눌러주세요', canvas.width / 2, canvas.height / 2 - 10);
ctx.font = '13px sans-serif';
ctx.fillStyle = '#444';
ctx.fillText('← → 키 또는 마우스로 패들을 움직입니다', canvas.width / 2, canvas.height / 2 + 20);

// 리더보드 로드
loadLeaderboard();
</script>

</body>
</html>
